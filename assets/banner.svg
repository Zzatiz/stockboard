<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="300" viewBox="0 0 1200 300">
  <defs>
    <!-- Dark background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#161b22;stop-opacity:1" />
    </linearGradient>
    <!-- Green glow for upward candles -->
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#26a641;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a7a30;stop-opacity:1" />
    </linearGradient>
    <!-- Red gradient for downward candles -->
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f85149;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c0392b;stop-opacity:1" />
    </linearGradient>
    <!-- Gold accent gradient for text -->
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f0c040;stop-opacity:1" />
      <stop offset="60%" style="stop-color:#ffd700;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e8a020;stop-opacity:1" />
    </linearGradient>
    <!-- Subtle grid line pattern -->
    <pattern id="grid" width="60" height="40" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 40" fill="none" stroke="#1e2530" stroke-width="0.5"/>
    </pattern>
    <!-- Glow filter for EMA line -->
    <filter id="lineGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Subtle drop shadow for text -->
    <filter id="textShadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
    <!-- Bollinger band fill -->
    <linearGradient id="bandFill" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:0.08" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:0.03" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="300" fill="url(#bgGrad)" rx="0" ry="0"/>
  <!-- Grid overlay -->
  <rect width="1200" height="300" fill="url(#grid)"/>

  <!-- Left accent bar -->
  <rect x="0" y="0" width="4" height="300" fill="url(#titleGrad)"/>

  <!-- ===== CANDLESTICK CHART AREA (right side) ===== -->
  <!-- Chart panel background -->
  <rect x="620" y="30" width="550" height="240" rx="6" fill="#0d1117" fill-opacity="0.7" stroke="#21262d" stroke-width="1"/>

  <!-- Bollinger Bands (upper + lower) -->
  <path d="M640,160 C670,145 700,130 730,120 C760,110 790,108 820,115 C850,122 880,118 910,112 C940,106 970,100 1000,108 C1030,116 1060,124 1090,118 C1120,112 1145,105 1155,102"
        fill="none" stroke="#3b82f6" stroke-width="1" stroke-dasharray="4,3" opacity="0.6"/>
  <path d="M640,220 C670,230 700,235 730,228 C760,221 790,218 820,225 C850,232 880,228 910,222 C940,216 970,210 1000,218 C1030,226 1060,232 1090,226 C1120,220 1145,215 1155,212"
        fill="none" stroke="#3b82f6" stroke-width="1" stroke-dasharray="4,3" opacity="0.6"/>
  <!-- Bollinger fill between bands -->
  <path d="M640,160 C670,145 700,130 730,120 C760,110 790,108 820,115 C850,122 880,118 910,112 C940,106 970,100 1000,108 C1030,116 1060,124 1090,118 C1120,112 1145,105 1155,102
           L1155,212 C1145,215 1120,220 1090,226 C1060,232 1030,226 1000,218 C970,210 940,216 910,222 C880,228 850,232 820,225 C790,218 760,221 730,228 C700,235 670,230 640,220 Z"
        fill="url(#bandFill)"/>

  <!-- EMA Line -->
  <path d="M640,190 C670,185 700,178 730,170 C760,162 790,160 820,168 C850,176 880,172 910,165 C940,158 970,152 1000,160 C1030,168 1060,174 1090,168 C1120,162 1145,156 1155,153"
        fill="none" stroke="#f59e0b" stroke-width="2" filter="url(#lineGlow)" opacity="0.85"/>

  <!-- Fibonacci level lines (faint) -->
  <line x1="640" y1="140" x2="1155" y2="140" stroke="#a855f7" stroke-width="0.8" stroke-dasharray="6,4" opacity="0.4"/>
  <line x1="640" y1="185" x2="1155" y2="185" stroke="#a855f7" stroke-width="0.8" stroke-dasharray="6,4" opacity="0.4"/>
  <text x="1158" y="144" font-family="monospace" font-size="9" fill="#a855f7" opacity="0.7">0.618</text>
  <text x="1158" y="189" font-family="monospace" font-size="9" fill="#a855f7" opacity="0.7">0.382</text>

  <!-- Candlestick 1 (green, up) -->
  <line x1="660" y1="175" x2="660" y2="215" stroke="#26a641" stroke-width="1.5"/>
  <rect x="654" y="180" width="12" height="28" fill="url(#greenGrad)" rx="1"/>
  <!-- Candlestick 2 (red, down) -->
  <line x1="690" y1="162" x2="690" y2="205" stroke="#f85149" stroke-width="1.5"/>
  <rect x="684" y="168" width="12" height="26" fill="url(#redGrad)" rx="1"/>
  <!-- Candlestick 3 (green) -->
  <line x1="720" y1="148" x2="720" y2="190" stroke="#26a641" stroke-width="1.5"/>
  <rect x="714" y="153" width="12" height="28" fill="url(#greenGrad)" rx="1"/>
  <!-- Candlestick 4 (green) -->
  <line x1="750" y1="140" x2="750" y2="175" stroke="#26a641" stroke-width="1.5"/>
  <rect x="744" y="145" width="12" height="22" fill="url(#greenGrad)" rx="1"/>
  <!-- Candlestick 5 (red) -->
  <line x1="780" y1="148" x2="780" y2="188" stroke="#f85149" stroke-width="1.5"/>
  <rect x="774" y="154" width="12" height="24" fill="url(#redGrad)" rx="1"/>
  <!-- Candlestick 6 (green) -->
  <line x1="810" y1="145" x2="810" y2="182" stroke="#26a641" stroke-width="1.5"/>
  <rect x="804" y="150" width="12" height="22" fill="url(#greenGrad)" rx="1"/>
  <!-- Candlestick 7 (green) -->
  <line x1="840" y1="135" x2="840" y2="172" stroke="#26a641" stroke-width="1.5"/>
  <rect x="834" y="140" width="12" height="24" fill="url(#greenGrad)" rx="1"/>
  <!-- Candlestick 8 (red) -->
  <line x1="870" y1="140" x2="870" y2="178" stroke="#f85149" stroke-width="1.5"/>
  <rect x="864" y="146" width="12" height="22" fill="url(#redGrad)" rx="1"/>
  <!-- Candlestick 9 (green) -->
  <line x1="900" y1="130" x2="900" y2="168" stroke="#26a641" stroke-width="1.5"/>
  <rect x="894" y="134" width="12" height="24" fill="url(#greenGrad)" rx="1"/>
  <!-- Candlestick 10 (green) -->
  <line x1="930" y1="122" x2="930" y2="160" stroke="#26a641" stroke-width="1.5"/>
  <rect x="924" y="126" width="12" height="24" fill="url(#greenGrad)" rx="1"/>
  <!-- Candlestick 11 (red) -->
  <line x1="960" y1="128" x2="960" y2="166" stroke="#f85149" stroke-width="1.5"/>
  <rect x="954" y="134" width="12" height="22" fill="url(#redGrad)" rx="1"/>
  <!-- Candlestick 12 (green) -->
  <line x1="990" y1="118" x2="990" y2="158" stroke="#26a641" stroke-width="1.5"/>
  <rect x="984" y="122" width="12" height="26" fill="url(#greenGrad)" rx="1"/>
  <!-- Candlestick 13 (green) -->
  <line x1="1020" y1="112" x2="1020" y2="148" stroke="#26a641" stroke-width="1.5"/>
  <rect x="1014" y="116" width="12" height="22" fill="url(#greenGrad)" rx="1"/>
  <!-- Candlestick 14 (red) -->
  <line x1="1050" y1="116" x2="1050" y2="155" stroke="#f85149" stroke-width="1.5"/>
  <rect x="1044" y="122" width="12" height="24" fill="url(#redGrad)" rx="1"/>
  <!-- Candlestick 15 (green) -->
  <line x1="1080" y1="108" x2="1080" y2="148" stroke="#26a641" stroke-width="1.5"/>
  <rect x="1074" y="112" width="12" height="26" fill="url(#greenGrad)" rx="1"/>
  <!-- Candlestick 16 (green, tall) -->
  <line x1="1110" y1="100" x2="1110" y2="142" stroke="#26a641" stroke-width="1.5"/>
  <rect x="1104" y="104" width="12" height="28" fill="url(#greenGrad)" rx="1"/>
  <!-- Candlestick 17 (green) -->
  <line x1="1140" y1="95" x2="1140" y2="136" stroke="#26a641" stroke-width="1.5"/>
  <rect x="1134" y="99" width="12" height="26" fill="url(#greenGrad)" rx="1"/>

  <!-- Volume bars at bottom of chart -->
  <rect x="654" y="248" width="12" height="16" fill="#26a641" opacity="0.4" rx="1"/>
  <rect x="684" y="252" width="12" height="12" fill="#f85149" opacity="0.4" rx="1"/>
  <rect x="714" y="246" width="12" height="18" fill="#26a641" opacity="0.4" rx="1"/>
  <rect x="744" y="250" width="12" height="14" fill="#26a641" opacity="0.4" rx="1"/>
  <rect x="774" y="253" width="12" height="11" fill="#f85149" opacity="0.4" rx="1"/>
  <rect x="804" y="249" width="12" height="15" fill="#26a641" opacity="0.4" rx="1"/>
  <rect x="834" y="244" width="12" height="20" fill="#26a641" opacity="0.4" rx="1"/>
  <rect x="864" y="251" width="12" height="13" fill="#f85149" opacity="0.4" rx="1"/>
  <rect x="894" y="245" width="12" height="19" fill="#26a641" opacity="0.4" rx="1"/>
  <rect x="924" y="243" width="12" height="21" fill="#26a641" opacity="0.4" rx="1"/>
  <rect x="954" y="252" width="12" height="12" fill="#f85149" opacity="0.4" rx="1"/>
  <rect x="984" y="241" width="12" height="23" fill="#26a641" opacity="0.4" rx="1"/>
  <rect x="1014" y="247" width="12" height="17" fill="#26a641" opacity="0.4" rx="1"/>
  <rect x="1044" y="250" width="12" height="14" fill="#f85149" opacity="0.4" rx="1"/>
  <rect x="1074" y="244" width="12" height="20" fill="#26a641" opacity="0.4" rx="1"/>
  <rect x="1104" y="240" width="12" height="24" fill="#26a641" opacity="0.4" rx="1"/>
  <rect x="1134" y="238" width="12" height="26" fill="#26a641" opacity="0.4" rx="1"/>

  <!-- Chart label -->
  <text x="648" y="50" font-family="monospace" font-size="11" fill="#8b949e">AAPL  1m  5D</text>
  <text x="1060" y="50" font-family="monospace" font-size="10" fill="#26a641">+4.82%  ▲</text>

  <!-- ===== LEFT TEXT SECTION ===== -->
  <!-- Main title -->
  <text x="55" y="108" font-family="'Segoe UI', Arial, sans-serif" font-size="58" font-weight="800"
        fill="url(#titleGrad)" filter="url(#textShadow)" letter-spacing="-1">stockboard</text>

  <!-- Tagline -->
  <text x="58" y="142" font-family="'Segoe UI', Arial, sans-serif" font-size="16" fill="#8b949e" letter-spacing="0.5">
    Stock Market Prediction · Local Webapp
  </text>

  <!-- Divider line -->
  <line x1="58" y1="160" x2="560" y2="160" stroke="#21262d" stroke-width="1"/>

  <!-- Feature pills -->
  <!-- Bollinger Bands -->
  <rect x="58" y="172" width="148" height="26" rx="13" fill="#1f2937" stroke="#374151" stroke-width="1"/>
  <text x="132" y="189" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#60a5fa" text-anchor="middle">Bollinger Bands</text>

  <!-- EMA -->
  <rect x="216" y="172" width="80" height="26" rx="13" fill="#1f2937" stroke="#374151" stroke-width="1"/>
  <text x="256" y="189" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#f59e0b" text-anchor="middle">EMA</text>

  <!-- Fibonacci -->
  <rect x="306" y="172" width="100" height="26" rx="13" fill="#1f2937" stroke="#374151" stroke-width="1"/>
  <text x="356" y="189" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#a78bfa" text-anchor="middle">Fibonacci</text>

  <!-- Elliott Wave -->
  <rect x="416" y="172" width="118" height="26" rx="13" fill="#1f2937" stroke="#374151" stroke-width="1"/>
  <text x="475" y="189" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#34d399" text-anchor="middle">Elliott Wave</text>

  <!-- Options support -->
  <rect x="58" y="208" width="144" height="26" rx="13" fill="#1f2937" stroke="#374151" stroke-width="1"/>
  <text x="130" y="225" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#fb923c" text-anchor="middle">Options Flow</text>

  <!-- Real-time data -->
  <rect x="212" y="208" width="146" height="26" rx="13" fill="#1f2937" stroke="#374151" stroke-width="1"/>
  <text x="285" y="225" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#22d3ee" text-anchor="middle">Real-Time Data</text>

  <!-- Python + JS -->
  <rect x="368" y="208" width="110" height="26" rx="13" fill="#1f2937" stroke="#374151" stroke-width="1"/>
  <text x="423" y="225" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#94a3b8" text-anchor="middle">Python · JS</text>

  <!-- Bottom tagline -->
  <text x="58" y="270" font-family="'Segoe UI', Arial, sans-serif" font-size="13" fill="#4b5563">
    Quantitative wave analysis for smarter options trading decisions
  </text>
</svg>
